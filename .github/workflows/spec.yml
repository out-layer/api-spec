name: spec

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Lint spec
        run: npm run lint
      - name: Ensure committed openapi.json matches openapi.yaml
        run: npm run check:bundle
